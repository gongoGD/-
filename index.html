<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>대전 어드벤처 픽스쳐</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
  :root{
    --neon:#39ff14;
    --neon-soft:#4ade80;
    --bg-page:#050607;
    --bg-phone:#16181b;
    --bg-panel:#1d2024;
    --bg-elev:#26292e;
    --line:#33373d;
    --txt:#f2f4f5;
    --txt-dim:#9aa0a6;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{
    font-family:"Pretendard","Pretendard Variable",-apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    background:
      radial-gradient(1200px 600px at 50% -10%, #11150f 0%, transparent 60%),
      var(--bg-page);
    color:var(--txt);
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    padding:24px 12px;
  }
  /* ===== 폰 프레임 ===== */
  .phone{
    position:relative;
    width:420px;max-height:850px;
    background:var(--bg-phone);
    border-radius:30px;
    border:1px solid #2a2e33;
    box-shadow:0 0 0 8px #0b0c0e,0 30px 70px rgba(0,0,0,0.65),0 0 60px rgba(57,255,20,0.05);
    display:flex;flex-direction:column;
    overflow:hidden;
  }
  /* ===== 헤더 ===== */
  .header{
    flex-shrink:0;
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 18px 14px;
    background:linear-gradient(180deg,#1b1e22 0%,var(--bg-phone) 100%);
  }
  .title-wrap{display:flex;flex-direction:column;gap:2px;min-width:0;}
  .title{font-size:15.5px;font-weight:700;}
  /* ===== 스크롤 본문 ===== */
  .scroll{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;scrollbar-width:thin;scrollbar-color:#3a3f45 transparent;}
  .scroll::-webkit-scrollbar{width:6px;}
  .scroll::-webkit-scrollbar-thumb{background:#3a3f45;border-radius:3px;}
  /* ===== 뷰파인더 ===== */
  #viewfinder{
    position:relative;width:100%;
    aspect-ratio:9 / 16;
    background-color:#0e1a10;
    background-image:
      linear-gradient(180deg, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.05) 40%, rgba(0,0,0,0.45) 100%),
      url("https://images.unsplash.com/photo-1542273917363-3b1817f69a2d?auto=format&fit=crop&w=840&q=80");
    background-size:cover;background-position:center;
    transition:aspect-ratio 0.3s ease;overflow:hidden;
  }
  /* 라이브 카메라 */
  #cameraFeed{
    position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
    z-index:1;background:#000;display:none;
  }
  #cameraFeed.live{display:block;}
  #cameraFeed.mirror{transform:scaleX(-1);}
  /* 카메라 시작 / 상태 안내 */
  .cam-start{
    position:absolute;inset:0;z-index:7;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
    background:rgba(0,0,0,0.4);cursor:pointer;transition:opacity .25s;padding:20px;
  }
  .cam-start.hide{opacity:0;pointer-events:none;}
  .cam-start .cam-icon{
    width:62px;height:62px;border-radius:50%;background:rgba(255,255,255,0.94);
    display:flex;align-items:center;justify-content:center;font-size:28px;
    box-shadow:0 0 26px rgba(57,255,20,0.4);
  }
  .cam-start .cam-label{
    font-size:13px;font-weight:700;color:#fff;background:rgba(0,0,0,0.5);
    padding:7px 15px;border-radius:999px;max-width:82%;text-align:center;line-height:1.45;
  }
  /* 전/후면 전환 */
  .cam-flip{
    position:absolute;top:12px;right:12px;z-index:8;width:38px;height:38px;
    border:none;border-radius:50%;background:rgba(0,0,0,0.5);color:#fff;font-size:17px;
    cursor:pointer;display:none;backdrop-filter:blur(2px);
  }
  .cam-flip.show{display:block;}
  /* 상단 토스트 */
  .toast{
    position:absolute;top:14px;left:50%;transform:translateX(-50%) translateY(-12px);
    background:var(--neon);color:#0a0f07;font-size:12.5px;font-weight:700;
    padding:9px 16px;border-radius:999px;z-index:11;opacity:0;pointer-events:none;transition:.3s;
    box-shadow:0 6px 20px rgba(57,255,20,0.4);max-width:88%;text-align:center;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  /* 촬영 플래시 */
  .flash{position:absolute;inset:0;background:#fff;z-index:12;opacity:0;pointer-events:none;}
  .flash.fire{animation:flashFire .45s ease;}
  @keyframes flashFire{0%{opacity:.92;}100%{opacity:0;}}
  /* ===== 하단 패널 ===== */
  .panel{padding:18px 16px 22px;background:var(--bg-phone);}
  .section-title{font-size:13px;color:var(--txt-dim);font-weight:600;margin:0 2px 8px;letter-spacing:.2px;}
  /* 필터(스티커) 선택 그리드 */
  .sticker-options{
    display:flex; gap:10px; overflow-x:auto; padding-bottom:10px;
    scrollbar-width:none;
  }
  .sticker-options::-webkit-scrollbar { display:none; }
  
  .sticker-item{
    flex:0 0 70px;
    display:flex;flex-direction:column;align-items:center;gap:6px;
    cursor:pointer; transition:0.2s;
  }
  .sticker-item:active{ transform:scale(0.95); }
  .sticker-thumb{
    width:70px;height:70px;border-radius:12px;background:var(--bg-panel);
    border:1px solid var(--line); display:flex;align-items:center;justify-content:center;
    overflow:hidden;
  }
  .sticker-thumb img{ width:80%;height:80%;object-fit:contain; }
  .sticker-name{
    font-size:11px;color:var(--txt-dim);font-weight:600;text-align:center;
    white-space:nowrap;
  }
  /* 최하단 조작부 */
  .controls{display:flex;align-items:center;justify-content:center;margin-top:22px;}
  .shutter{
    width:70px;height:70px;border-radius:50%;background:#fff;border:4px solid #c9ccd1;
    box-shadow:0 0 0 3px var(--bg-phone),0 0 24px rgba(255,255,255,0.25);cursor:pointer;transition:.12s;
  }
  .shutter:active{transform:scale(0.92);box-shadow:0 0 0 3px var(--bg-phone),0 0 12px rgba(255,255,255,0.4);}
  /* ===== 촬영 결과 ===== */
  .result{
    position:fixed;inset:0;z-index:22;background:rgba(0,0,0,0.9);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:20px;
    opacity:0;visibility:hidden;transition:opacity .25s,visibility .25s;
  }
  .result.open{opacity:1;visibility:visible;}
  .result .r-title{color:#fff;font-size:15px;font-weight:700;}
  .result img{max-width:80%;max-height:54%;border-radius:14px;border:2px solid rgba(255,255,255,0.25);box-shadow:0 10px 30px rgba(0,0,0,0.5);}
  .result .r-btns{display:flex;flex-direction:column;gap:10px;width:82%;margin-top:4px;}
  .r-save{padding:13px;border:none;border-radius:12px;background:var(--neon);color:#0a0f07;font-size:14px;font-weight:800;cursor:pointer;}
  .r-retake{padding:11px;border:1px solid rgba(255,255,255,0.4);border-radius:12px;background:transparent;color:#fff;font-size:13px;font-weight:600;cursor:pointer;}
  /* ===== 스티커(필터): 드래그 이동 + 모서리 크기조절 ===== */
  .canvas-sticker{
    position:absolute; z-index:8; top:50%; left:50%;
    transform:translate(-50%,-50%);
    width:120px; touch-action:none; cursor:grab;
    border:1px dashed transparent;
  }
  .canvas-sticker.active{
    border-color:rgba(57,255,20,0.75);
  }
  .canvas-sticker.dragging{cursor:grabbing;}
  .canvas-sticker img{
    display:block;width:100%;height:auto;pointer-events:none;user-select:none;-webkit-user-select:none;
    filter:drop-shadow(0 3px 8px rgba(0,0,0,0.45));
  }
  .canvas-sticker .resize-handle{
    position:absolute;right:-10px;bottom:-10px;width:24px;height:24px;border-radius:50%;
    background:var(--neon);border:2px solid #0a0f07;box-shadow:0 1px 6px rgba(0,0,0,0.55);
    touch-action:none;cursor:nwse-resize;z-index:2; display:none;
  }
  .canvas-sticker .delete-btn{
    position:absolute;left:-10px;top:-10px;width:24px;height:24px;border-radius:50%;
    background:#ff3b30;color:#fff;border:2px solid #0a0f07;box-shadow:0 1px 6px rgba(0,0,0,0.55);
    display:none; align-items:center; justify-content:center; font-size:14px; font-weight:bold;
    cursor:pointer; z-index:2; line-height:1;
  }
  .canvas-sticker.active .resize-handle,
  .canvas-sticker.active .delete-btn {
    display:flex;
  }
  /* 모바일 꽉 채우기 */
  @media (max-width:480px){
    body{padding:0;background:var(--bg-page);}
    .phone{
      width:100%;max-width:none;
      height:100vh;height:100dvh;max-height:none;
      border-radius:0;border:none;box-shadow:none;
    }
  }
</style>
</head>
<body>
<div class="phone">
  <div class="header">
    <div class="title-wrap">
      <div class="title">📸 대전 관광 픽스쳐</div>
    </div>
  </div>
  <div class="scroll">
    <!-- 뷰파인더 -->
    <div id="viewfinder" onclick="deselectAllStickers()">
      <video id="cameraFeed" autoplay playsinline muted></video>
      <button class="cam-flip" id="camFlip" onclick="flipCamera(event)" aria-label="전후면 전환">🔄</button>
      <!-- 카메라 시작 -->
      <div class="cam-start" id="camStart" onclick="startCamera()">
        <div class="cam-icon">📷</div>
        <div class="cam-label" id="camLabel">탭하여 실시간 카메라 시작</div>
      </div>
      <div class="toast" id="toast"></div>
      <div class="flash" id="flash"></div>
      <!-- 스티커들이 추가될 컨테이너 -->
      <div id="stickerContainer"></div>
    </div>
    <!-- 하단 패널 -->
    <div class="panel">
      <div class="section-title">대전 상징 스티커 추가하기</div>
      
      <!-- 스티커 선택 목록 -->
      <div class="sticker-options">
        <div class="sticker-item" onclick="addSticker('hanbit.png')">
          <div class="sticker-thumb"><img src="hanbit.png" alt="한빛탑"></div>
          <div class="sticker-name">한빛탑</div>
        </div>
        <div class="sticker-item" onclick="addSticker('ballpark.png')">
          <div class="sticker-thumb"><img src="ballpark.png" alt="볼파크"></div>
          <div class="sticker-name">볼파크</div>
        </div>
        <div class="sticker-item" onclick="addSticker('kumdori.png')">
          <div class="sticker-thumb"><img src="kumdori.png" alt="꿈돌이"></div>
          <div class="sticker-name">꿈돌이</div>
        </div>
        <div class="sticker-item" onclick="addSticker('sungsimdang.png')">
          <div class="sticker-thumb"><img src="sungsimdang.png" alt="성심당"></div>
          <div class="sticker-name">성심당</div>
        </div>
      </div>
      <div style="font-size:11px;color:var(--txt-dim);margin-top:8px;text-align:center;">
        👆 원하는 이미지를 탭해서 사진에 추가하고 자유롭게 배치하세요.
      </div>
      <div class="controls">
        <button class="shutter" onclick="captureShot()" aria-label="셔터"></button>
      </div>
    </div>
  </div>
  <!-- 촬영 결과 -->
  <div class="result" id="result">
    <div class="r-title">📸 촬영 완료!</div>
    <img id="shotImg" alt="촬영한 사진">
    <div class="r-btns">
      <button class="r-save" onclick="savePhoto()">📥 갤러리에 저장</button>
      <button class="r-retake" onclick="closeResult()">↩︎ 다시 찍기</button>
    </div>
  </div>
</div>
<script>
  /* ===== 카메라 로직 ===== */
  let camStream = null;
  let camFacing = 'environment';
  const videoEl = document.getElementById('cameraFeed');
  const camStart = document.getElementById('camStart');
  async function startCamera(){
    try{
      if(camStream) camStream.getTracks().forEach(t=>t.stop());
      camStream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode: camFacing }, audio:false });
      videoEl.srcObject = camStream;
      await videoEl.play();
      videoEl.classList.add('live');
      videoEl.classList.toggle('mirror', camFacing === 'user');
      camStart.classList.add('hide');
      document.getElementById('camFlip').classList.add('show');
    }catch(err){
      alert("카메라를 켤 수 없습니다. 브라우저 설정을 확인해주세요.");
    }
  }
  async function flipCamera(e){
    e.stopPropagation();
    camFacing = (camFacing === 'environment') ? 'user' : 'environment';
    await startCamera();
  }
  /* ===== 스티커 다중 추가 및 조작 로직 ===== */
  const stickerContainer = document.getElementById('stickerContainer');
  let activeSticker = null;
  function addSticker(imgSrc) {
    // 실제 이미지가 첨부된 경로를 사용하도록 안내 (여기서는 파일명으로 테스트)
    const stickerDiv = document.createElement('div');
    stickerDiv.className = 'canvas-sticker active';
    
    // 모바일 터치이벤트를 위해 left/top 값을 픽셀로 지정해두는 것이 조작에 유리합니다.
    const vfRect = document.getElementById('viewfinder').getBoundingClientRect();
    stickerDiv.style.left = (vfRect.width / 2) + 'px';
    stickerDiv.style.top = (vfRect.height / 2) + 'px';
    stickerDiv.style.transform = 'translate(-50%, -50%)';
    const img = document.createElement('img');
    img.src = imgSrc;
    
    const delBtn = document.createElement('div');
    delBtn.className = 'delete-btn';
    delBtn.innerHTML = '×';
    delBtn.onclick = (e) => {
      e.stopPropagation();
      stickerDiv.remove();
    };
    const resizeBtn = document.createElement('div');
    resizeBtn.className = 'resize-handle';
    
    stickerDiv.appendChild(img);
    stickerDiv.appendChild(delBtn);
    stickerDiv.appendChild(resizeBtn);
    
    stickerContainer.appendChild(stickerDiv);
    
    makeStickerInteractive(stickerDiv, resizeBtn);
    setActiveSticker(stickerDiv);
  }
  function setActiveSticker(sticker) {
    if(activeSticker) {
      activeSticker.classList.remove('active');
    }
    activeSticker = sticker;
    if(activeSticker) {
      activeSticker.classList.add('active');
    }
  }
  function deselectAllStickers() {
    if(activeSticker) activeSticker.classList.remove('active');
    activeSticker = null;
  }
  function makeStickerInteractive(sticker, resizer) {
    let isDragging = false;
    let isResizing = false;
    let startX, startY;
    let startLeft, startTop, startWidth;
    // 터치/마우스 이벤트 통합 헬퍼
    const getPos = (e) => e.touches ? {x: e.touches[0].clientX, y: e.touches[0].clientY} : {x: e.clientX, y: e.clientY};
    sticker.addEventListener('pointerdown', (e) => {
      if(e.target === resizer || e.target.classList.contains('delete-btn')) return;
      e.stopPropagation();
      setActiveSticker(sticker);
      
      isDragging = true;
      sticker.classList.add('dragging');
      const pos = getPos(e);
      startX = pos.x;
      startY = pos.y;
      
      const rect = sticker.getBoundingClientRect();
      const parentRect = sticker.parentElement.getBoundingClientRect();
      
      // translate(-50%,-50%)가 적용된 상태이므로 기준 좌표 계산 보정
      startLeft = parseFloat(sticker.style.left) || (rect.left - parentRect.left + rect.width/2);
      startTop = parseFloat(sticker.style.top) || (rect.top - parentRect.top + rect.height/2);
      
      // 터치 캡처 (모바일 스크롤 방지 등)
      sticker.setPointerCapture(e.pointerId);
    });
    resizer.addEventListener('pointerdown', (e) => {
      e.stopPropagation();
      isResizing = true;
      const pos = getPos(e);
      startX = pos.x;
      startWidth = sticker.offsetWidth;
      resizer.setPointerCapture(e.pointerId);
    });
    window.addEventListener('pointermove', (e) => {
      const pos = getPos(e);
      if(isDragging) {
        const dx = pos.x - startX;
        const dy = pos.y - startY;
        sticker.style.left = (startLeft + dx) + 'px';
        sticker.style.top = (startTop + dy) + 'px';
      }
      if(isResizing) {
        const dx = pos.x - startX;
        // 크기는 마우스 이동량에 비례하여 조절
        const newWidth = Math.max(50, startWidth + dx);
        sticker.style.width = newWidth + 'px';
      }
    });
    const stopInteraction = () => {
      if(isDragging) {
        isDragging = false;
        sticker.classList.remove('dragging');
      }
      isResizing = false;
    };
    window.addEventListener('pointerup', stopInteraction);
    window.addEventListener('pointercancel', stopInteraction);
  }
  /* ===== 촬영 및 결과 화면 ===== */
  function captureShot() {
    deselectAllStickers(); // 테두리 제거
    const flashEl = document.getElementById('flash');
    flashEl.classList.remove('fire'); 
    void flashEl.offsetWidth; 
    flashEl.classList.add('fire');
    setTimeout(() => {
      // 실제 앱에서는 캔버스에 비디오와 스티커를 합성하여 그림을 그리는 로직이 들어갑니다.
      // 본 데모에서는 스크린샷 캡쳐 로직이 복잡하므로 alert로 갈음하거나 합성된 느낌을 냅니다.
      
      // 간이 합성 로직 (html2canvas 등 없이 수동 캔버스 계산)
      const vf = document.getElementById('viewfinder');
      const canvas = document.createElement('canvas');
      canvas.width = vf.clientWidth;
      canvas.height = vf.clientHeight;
      const ctx = canvas.getContext('2d');
      
      // 1. 비디오 그리기
      if(camStream && videoEl.videoWidth) {
        // ... 비디오 종횡비 계산해서 그리기 로직 (생략 - 화면에 보이도록 임시처리)
        ctx.fillStyle = '#000';
        ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.drawImage(videoEl, 0, 0, canvas.width, canvas.height);
      } else {
        ctx.fillStyle = '#222';
        ctx.fillRect(0,0,canvas.width,canvas.height);
      }
      // 2. 스티커들 그리기
      const stickers = document.querySelectorAll('.canvas-sticker');
      stickers.forEach(st => {
        const img = st.querySelector('img');
        if(img.complete && img.naturalHeight !== 0) {
          const rect = st.getBoundingClientRect();
          const vfRect = vf.getBoundingClientRect();
          
          const x = rect.left - vfRect.left;
          const y = rect.top - vfRect.top;
          
          ctx.drawImage(img, x, y, rect.width, rect.height);
        }
      });
      const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
      document.getElementById('shotImg').src = dataUrl;
      document.getElementById('result').classList.add('open');
    }, 200);
  }
  function closeResult() {
    document.getElementById('result').classList.remove('open');
  }
  function savePhoto() {
    alert("갤러리에 저장되었습니다! (데모)");
  }
</script>
</body>
</html>
